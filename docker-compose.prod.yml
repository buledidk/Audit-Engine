version: '3.8'

services:
  app:
    build: .
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - postgres
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: auditengine
      POSTGRES_USER: auditengine
      POSTGRES_PASSWORD: auditengine
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  pgdata:
