    }
    .exp-btn:hover { transform: scale(1.05); }
    .exp-pdf  { background: #DC2626; color: #fff; }
    .exp-word { background: #1D4ED8; color: #fff; }
    .exp-xlsx { background: #059669; color: #fff; }
    @media print {
      #export-bar { display: none !important; }
      body { background: #fff !important; color: #000 !important; }
      nav, aside, header button, .no-print { display: none !important; }
      main { overflow: visible !important; height: auto !important; }
      table { page-break-inside: avoid; border-collapse: collapse; width: 100%; }
      tr, h1, h2, h3 { page-break-inside: avoid; }
      h2 { page-break-after: avoid; }
      @page { size: A4; margin: 15mm; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Export bar -->
  <div id="export-bar">
    <span>📤 EXPORT:</span>
    <button class="exp-btn exp-pdf"  onclick="exportPDF()">🖨 PDF</button>
    <button class="exp-btn exp-word" onclick="exportWord()">📄 Word (.doc)</button>
    <button class="exp-btn exp-xlsx" onclick="exportExcel()">📊 Excel (.xlsx)</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Export functions -->
  <script>
    function exportPDF() {
      window.print();
    }

    function exportWord() {
      const content = document.getElementById('root').innerHTML;
      const html = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office'
              xmlns:w='urn:schemas-microsoft-com:office:word'
              xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title>AuditEngine Working Papers</title>
        <style>
          body { font-family: Arial, sans-serif; font-size: 10pt; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #ccc; padding: 4px 6px; font-size: 9pt; }
          th { background: #1E3A8A; color: white; }
          h2 { font-size: 14pt; color: #1E3A8A; }
        </style></head>
        <body>${content}</body></html>`;
      const blob = new Blob([html], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url;
      a.download = 'AuditEngine_WorkingPapers.doc'; a.click();
      URL.revokeObjectURL(url);
    }

    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const tables = document.querySelectorAll('table');
      if (tables.length === 0) {
        alert('Please navigate to a working paper with a table first (e.g. Risk Summary, Audit Strategy, or a Testing section), then click Export Excel.');
        return;
      }
      tables.forEach((tbl, i) => {
        try {
          const ws = XLSX.utils.table_to_sheet(tbl);
          XLSX.utils.book_append_sheet(wb, ws, 'Sheet' + (i + 1));
        } catch(e) {}
      });
      XLSX.writeFile(wb, 'AuditEngine_Export.xlsx');
    }
  </script>

  useEffect(()=>{setTimeout(()=>setRdy(true),100);},[]);

  // Persist state to localStorage
  useEffect(()=>{saveLS({mode,ind,sec,fw,sz,ent,wp,progress,notes});},[mode,ind,sec,fw,sz,ent,wp,progress,notes]);

  // Keyboard navigation for working papers (Alt+Arrow)
  useEffect(()=>{
    if(mode!=="file")return;
    const h=(e)=>{
      if(!e.altKey)return;
      const idx=WPS.findIndex(w=>w.id===wp);
      if(e.key==="ArrowDown"&&idx<WPS.length-1){e.preventDefault();setWp(WPS[idx+1].id);}
      else if(e.key==="ArrowUp"&&idx>0){e.preventDefault();setWp(WPS[idx-1].id);}

    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[mode,wp]);

  const d=ind?I[ind]:null;
  const fwd=fw?FW[fw]:null;
  const szd=sz?SZ[sz]:null;
  const wpo=WPS.find(w=>w.id===wp);
  const grp=useMemo(()=>{const g={};WPS.forEach(w=>{if(!g[w.ph])g[w.ph]=[];g[w.ph].push(w);});return g;},[]);

  const Badge=({lv,sm})=>{const c={SIGNIFICANT:{bg:"#FEE2E2",b:"#EF4444",t:"#B91C1C"},ELEVATED:{bg:"#FEF3C7",b:"#F59E0B",t:"#92400E"},NORMAL:{bg:"#D1FAE5",b:"#10B981",t:"#065F46"}}[lv]||{};return<span style={{padding:sm?"1px 5px":"3px 8px",borderRadius:3,background:c.bg,border:`1px solid ${c.b}`,color:c.t,fontSize:sm?7:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{lv}</span>;};

  // ═══ LANDING PAGE ═══

          {wp==="z"&&(<div><Hdr t="Audit Trail Map" sub="ISA 230.8-11 · Assembly: 60 days (ISA 230.14)"/><div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:6,padding:12}}><table style={{width:"100%",fontSize:8}}><thead><tr>{["Ref","Title","Phase","Sig","Status"].map(h=><th key={h} style={{background:"#4B5563",color:"#fff",padding:"5px",fontSize:7,fontFamily:"'JetBrains Mono',monospace"}}>{h}</th>)}</tr></thead><tbody>{WPS.filter(w=>w.id!=="dash").map((w,i)=>(<tr key={i} style={{background:i%2===0?"#F8FAFC":"#fff",cursor:"pointer"}} onClick={()=>setWp(w.id)}><td style={{padding:"4px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:w.s?"#DC2626":"#2563EB"}}>{w.ref}</td><td style={{padding:"4px"}}>{w.title}</td><td style={{padding:"4px",color:PH[w.ph]?.c,fontSize:7}}>{PH[w.ph]?.l}</td><td style={{padding:"4px"}}>{w.s&&<Badge lv="SIGNIFICANT" sm/>}</td><td style={{padding:"4px"}}>{(()=>{const st=progress[w.id]||"draft";const cfg={draft:{bg:"#FEF3C7",c:"#92400E",l:"Draft"},review:{bg:"#DBEAFE",c:"#1E40AF",l:"In Review"},done:{bg:"#D1FAE5",c:"#065F46",l:"Complete"}}[st];return(<span style={{padding:"1px 5px",borderRadius:2,background:cfg.bg,fontSize:6,color:cfg.c,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{cfg.l}</span>);})()}</td></tr>))}</tbody></table><div style={{marginTop:8,padding:8,background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:5,display:"flex",gap:12,fontSize:9}}>{(()=>{const total=WPS.filter(w=>w.id!=="dash").length;const done=Object.values(progress).filter(s=>s==="done").length;const review=Object.values(progress).filter(s=>s==="review").length;const pct=Math.round((done/total)*100);return(<><div><strong style={{color:"#065F46"}}>{done}</strong> Complete</div><div><strong style={{color:"#1E40AF"}}>{review}</strong> In Review</div><div><strong style={{color:"#92400E"}}>{total-done-review}</strong> Draft</div><div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}><div style={{width:120,height:8,background:"#E2E8F0",borderRadius:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#10B981,#059669)",transition:"width 0.3s"}}/></div><strong style={{fontFamily:"'JetBrains Mono',monospace",color:"#065F46"}}>{pct}%</strong></div></>);})()}</div></div></div>)}
          {/* REG */}
          {wp==="reg"&&(<div><Hdr t="Regulatory Framework" sub="Companies Act 2006 · ISA (UK) · FRC · Companies House"/><div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:6,padding:10,marginBottom:10}}><div style={{fontSize:9,fontWeight:700,color:"#92400E",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>REASONABLE ASSURANCE — NOT ABSOLUTE (ISA 200.5)</div><div style={{fontSize:9,color:"#78716C",lineHeight:1.5}}>An audit provides reasonable assurance about whether FS are free from material misstatement. This is NOT a guarantee. Limitations include: use of sampling (ISA 200.A53), inherent limitations of internal control including management override (ISA 200.A54), much evidence is persuasive not conclusive (ISA 200.A55), professional judgement creates subjectivity (ISA 200.A56).</div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:6,padding:12}}><div style={{fontSize:8,color:"#1E40AF",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>COMPANIES ACT 2006</div>{[["s.475","Requirement for audited accounts"],["s.477","Small company audit exemption: TO ≤£10.2m AND TA ≤£5.1m"],["s.495","True and fair view opinion"],["s.496","Report if inadequate records (s.386)"],["s.498","Auditor's right to information"],["s.510-513","Removal — special notice, statement"]].map(([r,d],i)=>(<div key={i} style={{display:"flex",gap:4,padding:"2px 0",borderBottom:"1px solid #F1F5F9"}}><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:7,fontWeight:700,color:"#2563EB",minWidth:42}}>{r}</span><span style={{fontSize:8,color:"#374151"}}>{d}</span></div>))}</div>
            <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:6,padding:12}}><div style={{fontSize:8,color:"#059669",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>COMPANIES HOUSE FILING</div>{["Private: 9 months from ARD (CA 2006 s.442)","Public: 6 months from ARD","Late penalties: £150-£1,500 (private); doubled for public","Confirmation statement: annually within 14 days (s.853A)","Charity: also file with Charity Commission (CA 2011 s.169)"].map((r,i)=>(<div key={i} style={{padding:"2px 0",borderBottom:"1px solid #F1F5F9",fontSize:8,color:"#374151"}}>• {r}</div>))}</div>
          </div><Sign/></div>)}
          {/* Fallback */}
          {!["dash","reg","a1","a3","a5","a6","a7","a8","b1","b3","c1","c2","c3","c4","d1","d3","d6","e3","e6","f1","f2","z"].includes(wp)&&d&&(<div><Hdr t={wpo?.title} sub=""/><div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:6,padding:12,fontSize:10,color:"#6B7280"}}>Customised {d.label} content for <strong>{sec}</strong> under <strong>{fwd?.l}</strong>. All industry-specific data populated.</div><Sign/></div>)}
        </main>
      </div>
    </div>
  );
}
