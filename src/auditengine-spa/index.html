<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditEngine v6 — Professional Audit Automation</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C4972A'/><text x='16' y='23' font-family='serif' font-size='22' font-weight='bold' fill='%230A0E17' text-anchor='middle'>A</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0E17;
      --sidebar: #0F1622;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #C4972A;
      --text: #E8E6E3;
      --dim: rgba(255,255,255,0.45);
      --green: #22C55E;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
    .shell { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 56px 1fr 32px; height: 100vh; }
    .header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
    }
    .header .logo {
      width: 32px; height: 32px; border-radius: 6px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: serif; font-weight: bold; font-size: 20px; color: var(--bg);
    }
    .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    .header h1 span { color: var(--accent); }
    .header .version { margin-left: auto; font-size: 11px; color: var(--dim); background: var(--card); padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border); }
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
    }
    .sidebar .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--dim); padding: 12px 16px 6px; text-transform: uppercase; }
    .sidebar .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      color: var(--text); transition: background 0.15s;
    }
    .sidebar .nav-item:hover { background: var(--card); }
    .sidebar .nav-item.active { background: rgba(196,151,42,0.12); color: var(--accent); border-right: 2px solid var(--accent); }
    .main {
      padding: 32px;
      overflow-y: auto;
    }
    .main .welcome { max-width: 720px; }
    .main .welcome h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .main .welcome p { color: var(--dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .main .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .main .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px; cursor: pointer; transition: border-color 0.2s;
    }
    .main .card:hover { border-color: var(--accent); }
    .main .card .card-icon { font-size: 28px; margin-bottom: 10px; }
    .main .card .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .main .card .card-desc { font-size: 12px; color: var(--dim); line-height: 1.4; }
    .footer {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; font-size: 11px; color: var(--dim);
      background: var(--sidebar); border-top: 1px solid var(--border);
    }
    .footer .status { display: flex; align-items: center; gap: 6px; }
    .footer .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="logo">A</div>
      <h1>Audit<span>Engine</span></h1>
      <div class="version">v6.0 SPA Reference</div>
    </header>
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
    <footer class="footer">
      <div class="status"><span class="dot"></span> Standalone reference shell</div>
      <div>ISA (UK) 200-810 | FRS 102 | Companies Act 2006</div>
    </footer>
  </div>
  <script type="module">
    const NAV = [
      { section: "Planning & Acceptance", items: [
        { icon: "\u{1F4CB}", label: "Engagement Letter", ref: "A1", isa: "ISA 210" },
        { icon: "\u{2705}", label: "Client Acceptance", ref: "A2", isa: "ISA 220" },
        { icon: "\u{1F3AF}", label: "Audit Strategy", ref: "A3", isa: "ISA 300" },
        { icon: "\u{1F4D0}", label: "Materiality", ref: "A4", isa: "ISA 320" },
        { icon: "\u{1F50D}", label: "Understanding the Entity", ref: "A5", isa: "ISA 315" },
      ]},
      { section: "Risk Assessment", items: [
        { icon: "\u{1F534}", label: "Risk Assessment Matrix", ref: "B1", isa: "ISA 315" },
        { icon: "\u{1F6E1}\uFE0F", label: "Controls Assessment", ref: "B2", isa: "ISA 315.14" },
        { icon: "\u{1F6A8}", label: "Significant Risks", ref: "B3", isa: "ISA 315.28" },
      ]},
      { section: "Testing Programmes", items: [
        { icon: "\u{1F4B7}", label: "Revenue", ref: "D1", isa: "ISA 240.26" },
        { icon: "\u{1F4E8}", label: "Receivables", ref: "D2", isa: "ISA 505" },
        { icon: "\u{1F4E6}", label: "Inventory / WIP", ref: "D3", isa: "ISA 501" },
        { icon: "\u{1F4E4}", label: "Payables", ref: "D4", isa: "ISA 505" },
        { icon: "\u{1F3E7}", label: "Cash & Bank", ref: "D6", isa: "ISA 505" },
        { icon: "\u{1F3D7}\uFE0F", label: "Fixed Assets", ref: "D7", isa: "ISA 540" },
      ]},
      { section: "Completion & Reporting", items: [
        { icon: "\u{2714}\uFE0F", label: "Completion Checklist", ref: "E1", isa: "ISA 220" },
        { icon: "\u{1F504}", label: "Going Concern", ref: "A7", isa: "ISA 570" },
        { icon: "\u{1F4DC}", label: "Audit Report", ref: "F2", isa: "ISA 700" },
      ]},
    ];

    const INDUSTRIES = [
      { icon: "\u{1F3D7}\uFE0F", title: "Construction", desc: "Contracts, WIP, retentions, CIS" },
      { icon: "\u{1F3ED}", title: "Manufacturing", desc: "Inventory, overhead absorption, NRV" },
      { icon: "\u{1F4BB}", title: "Technology & SaaS", desc: "Revenue allocation, dev costs, SBP" },
      { icon: "\u{1F3E6}", title: "Financial Services", desc: "IFRS 9, ECL, CASS, fair value" },
      { icon: "\u{1F6D2}", title: "Retail & Consumer", desc: "Stock counts, loyalty, leases" },
      { icon: "\u2696\uFE0F", title: "Professional Services", desc: "WIP lock-up, PI, client money" },
      { icon: "\u{1F3E2}", title: "Property & Real Estate", desc: "Valuations, development profit, SDLT" },
      { icon: "\u{1F91D}", title: "Charities & NFP", desc: "SORP, fund accounting, legacies" },
    ];

    const sidebar = document.getElementById("sidebar");
    NAV.forEach(group => {
      const lbl = document.createElement("div");
      lbl.className = "section-label";
      lbl.textContent = group.section;
      sidebar.appendChild(lbl);
      group.items.forEach((item, i) => {
        const el = document.createElement("div");
        el.className = "nav-item" + (group.section === "Planning & Acceptance" && i === 0 ? " active" : "");
        el.innerHTML = `<span>${item.icon}</span> ${item.ref} ${item.label}`;
        el.addEventListener("click", () => {
          sidebar.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
          el.classList.add("active");
        });
        sidebar.appendChild(el);
      });
    });

    const main = document.getElementById("main");
    main.innerHTML = `
      <div class="welcome">
        <h2>AuditEngine v6 Reference</h2>
        <p>
          This is a standalone SPA shell for AuditEngine. It demonstrates the navigation structure
          and industry coverage. For the full application with AI-powered audit automation,
          working paper generation, and ISA compliance, visit the production deployment.
        </p>
        <p style="font-size:12px;color:var(--dim)">8 industries | 97 working papers | ISA (UK) 200-810 | 37 standards</p>
      </div>
      <h3 style="margin:24px 0 12px;font-size:15px;font-weight:600">Industry Templates</h3>
      <div class="cards">
        ${INDUSTRIES.map(ind => `
          <div class="card">
            <div class="card-icon">${ind.icon}</div>
            <div class="card-title">${ind.title}</div>
            <div class="card-desc">${ind.desc}</div>
          </div>
        `).join("")}
      </div>
    `;
  </script>
</body>
</html>
