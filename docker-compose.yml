version: '3.8'

services:
  # PostgreSQL Database - Perfect for audit schemas
  postgres:
    image: postgres:15-alpine
    container_name: audit_postgres
    environment:
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_password_dev
      POSTGRES_DB: audit_engine
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audit_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache - For worker queue and caching
  redis:
    image: redis:7-alpine
    container_name: audit_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audit_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis Commander - Web UI for Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: audit_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - audit_network
    profiles:
      - debug  # Run with: docker-compose --profile debug up

  # Optional: PgAdmin - Web UI for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: audit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@audit.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - audit_network
    profiles:
      - debug  # Run with: docker-compose --profile debug up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  audit_network:
    driver: bridge

# Start with: docker-compose up -d
# Start with debug tools: docker-compose --profile debug up -d
# View logs: docker-compose logs -f
# Stop: docker-compose down
# Full cleanup: docker-compose down -v
