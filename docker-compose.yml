version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # AUDIT ENGINE - Main Application
  # ═══════════════════════════════════════════════════════════════════════════
  audit-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-engine
    ports:
      - '3001:3001'
      - '5173:5173'
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_PORT: 5173
      DATABASE_URL: postgresql://postgres:password@postgres:5432/audit_engine
      POSTGRES_URL: postgresql://postgres:password@postgres:5432/audit_engine
      POSTGRES_PRISMA_URL: postgresql://postgres:password@postgres:5432/audit_engine?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://postgres:password@postgres:5432/audit_engine
      REDIS_URL: redis://redis:6379
      # Supabase
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      # Claude API
      VITE_CLAUDE_API_KEY: ${VITE_CLAUDE_API_KEY}
      # AWS S3
      VITE_AWS_REGION: ${VITE_AWS_REGION:-eu-west-2}
      VITE_AWS_ACCESS_KEY_ID: ${VITE_AWS_ACCESS_KEY_ID}
      VITE_AWS_SECRET_ACCESS_KEY: ${VITE_AWS_SECRET_ACCESS_KEY}
      VITE_AWS_S3_BUCKET: ${VITE_AWS_S3_BUCKET}
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      # Legacy API Keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_URL: http://ollama:11434
      # Integration Services
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - ./uploads:/app/uploads
      - ./generated-reports:/app/generated-reports
      - ./logs:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - audit-network

  postgres:
    image: postgres:15-alpine
    container_name: audit-engine-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audit_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - audit-network

  redis:
    image: redis:7-alpine
    container_name: audit-engine-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - audit-network

  ollama:
    image: ollama/ollama:latest
    container_name: audit-engine-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    restart: unless-stopped
    networks:
      - audit-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  audit-network:
    driver: bridge
